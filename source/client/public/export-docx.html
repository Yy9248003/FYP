<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>导出为 DOCX</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Microsoft YaHei", sans-serif; margin: 24px; }
    h1 { margin: 0 0 12px 0; }
    .card { max-width: 880px; border: 1px solid #e5e5e5; border-radius: 8px; padding: 20px; box-shadow: 0 6px 24px rgba(0,0,0,0.06); }
    .row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
    .btn { background: #2d8cf0; color: #fff; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .hint { color: #555; font-size: 13px; margin-top: 8px; }
    .log { margin-top: 12px; font-size: 12px; color: #666; white-space: pre-wrap; background: #fafafa; border: 1px dashed #eee; padding: 10px; border-radius: 6px; max-height: 200px; overflow: auto; }
  </style>
  <!-- html-docx-js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/html-docx-js/dist/html-docx.js"></script>
</head>
<body>
  <div class="card">
    <h1>导出中期报告为 DOCX</h1>
    <div class="row">
      <span>源文件：</span>
      <code>/Interim_Report.doc</code>
    </div>
    <div class="row">
      <button id="exportBtn" class="btn">导出为 DOCX</button>
      <button id="previewBtn" class="btn" style="background:#19be6b">预览 HTML</button>
    </div>
    <div class="hint">说明：本页会抓取 HTML 报告、将所有图片转为内嵌 DataURL，再使用 html-docx-js 生成标准 .docx 文件。</div>
    <div id="log" class="log"></div>
  </div>

  <script>
    const logEl = document.getElementById('log');
    function log(msg){ logEl.textContent += msg + '\n'; }

    async function fetchText(url){
      const res = await fetch(url, { cache: 'no-cache' });
      if(!res.ok) throw new Error('获取文件失败: ' + res.status + ' ' + res.statusText);
      return res.text();
    }

    async function fetchAsDataURL(url){
      const res = await fetch(url, { cache: 'no-cache' });
      if(!res.ok) throw new Error('获取图片失败: ' + url);
      const blob = await res.blob();
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(blob);
      });
    }

    async function inlineImages(doc){
      const imgs = Array.from(doc.querySelectorAll('img'));
      if(imgs.length === 0){ log('未发现图片，无需内嵌。'); return; }
      log('发现图片 ' + imgs.length + ' 张，开始内嵌...');
      for(let i=0;i<imgs.length;i++){
        const img = imgs[i];
        const src = img.getAttribute('src');
        if(!src || src.startsWith('data:')){ continue; }
        // 仅处理同源路径
        try{
          const absolute = new URL(src, window.location.origin).href;
          const dataUrl = await fetchAsDataURL(absolute);
          img.setAttribute('src', dataUrl);
          log('已内嵌图片：' + src);
        }catch(e){
          log('内嵌失败（忽略）：' + src + ' -> ' + e.message);
        }
      }
      log('图片内嵌完成。');
    }

    async function exportDocx(){
      const btn = document.getElementById('exportBtn');
      btn.disabled = true;
      logEl.textContent = '';
      try{
        log('读取源文档 /Interim_Report.doc ...');
        const html = await fetchText('/Interim_Report.doc');

        // 解析为 DOM 并内嵌图片
        const parser = new DOMParser();
        const parsed = parser.parseFromString(html, 'text/html');
        await inlineImages(parsed);

        // 生成 .docx Blob
        log('正在转换为 .docx ...');
        const cleanHtml = '<!DOCTYPE html>' + parsed.documentElement.outerHTML;
        const blob = window.htmlDocx.asBlob(cleanHtml, { orientation: 'portrait' });

        // 触发下载
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Interim_Report.docx';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        log('导出完成：Interim_Report.docx');
      }catch(e){
        log('导出失败：' + e.message);
        alert('导出失败：' + e.message);
      }finally{
        btn.disabled = false;
      }
    }

    async function previewHtml(){
      try{
        const html = await fetchText('/Interim_Report.doc');
        const preview = window.open('', '_blank');
        preview.document.open();
        preview.document.write(html);
        preview.document.close();
      }catch(e){
        alert('预览失败：' + e.message);
      }
    }

    document.getElementById('exportBtn').addEventListener('click', exportDocx);
    document.getElementById('previewBtn').addEventListener('click', previewHtml);
  </script>
</body>
</html>
